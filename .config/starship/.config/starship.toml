format = """
[в–Ҳ](cyan)\
$os\
$username\
[рҹ¬¶рңөҹрңҙ»рңҙғ](bg:red fg:cyan)\
$directory\
[в—Ө](fg:red bg:orange)\
$git_branch\
$git_status\
[в—Ө](fg:orange bg:yellow)\
$c\
$cpp\
$elixir\
$elm\
$golang\
$haskell\
$python\
$java\
$kotlin\
$gradle\
$julia\
$nodejs\
$nim\
$rust\
$scala\
[в—Ө](fg:yellow bg:pink)\
$docker_context\
[в—Ө](fg:pink bg:blue)\
$time\
[оӮҙ ](fg:blue)\
"""

palette = 'foreverblush'
# Disable the blank line at the start of the prompt
# add_newline = false
"$schema" = 'https://starship.rs/config-schema.json'
# You can also replace your username with a neat symbol like п„   or disable this
# and use the os module below
[username]
show_always = true
style_user = "fg:light-white bg:cyan"
style_root = "fg:light-white bg:cyan"
format = '[$user ]($style)'
disabled = false

# An alternative to the username module which displays a symbol that
# represents the current operating system
[os]
style = "bg:cyan"
disabled = true # Disabled by default

[directory]
style = "fg:light-white bg:red"
read_only = " у°Ңҫ"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "вҖҰ/"

# Here is how you can shorten some long paths by text replacement
# similar to mapped_locations in Oh My Posh:
[directory.substitutions]
"Documents" = "у°Ҳҷ "
"Downloads" = "пҖҷ "
"Music" = "у°қҡ "
"Pictures" = "пҖҫ "
"Developer" = "у°ІӢ "
# Keep in mind that the order matters. For example:
# "Important Documents" = " у°Ҳҷп„Ә "
# will not be replaced, because "Documents" was already substituted before.
# So either put "Important Documents" before "Documents" or use the substituted version:
# "Important у°Ҳҷ " = " у°Ҳҷп„Ә "
[c]
symbol = "оҳһ "
style = "bg:yellow"
format = '[ $symbol ($version) ]($style)'

[cpp]
symbol = "оҳқ "
style = "bg:yellow"
format = '[ $symbol ($version) ]($style)'

[cmake]
symbol = "оһ” "
style = "bg:yellow"
format = '[ $symbol ($version) ]($style)'

[docker_context]
symbol = "пҢҲ "
style = "bg:green"
format = '[ $symbol $context ]($style)'

[elixir]
symbol = "оүө "
style = "bg:yellow"
format = '[ $symbol ($version) ]($style)'

[elm]
symbol = "оҳ¬ "
style = "bg:yellow"
format = '[ $symbol ($version) ]($style)'

[git_branch]
symbol = "пҗҳ"
style = "bg:orange"
format = '[ $symbol $branch ]($style)'

[git_status]
style = "bg:orange"
format = '[$all_status$ahead_behind ]($style)'

[golang]
symbol = "оҳ§ "
style = "bg:yellow"
format = '[ $symbol ($version) ]($style)'

[gradle]
style = "bg:yellow"
format = '[ $symbol ($version) ]($style)'

[haskell]
symbol = "оқ· "
style = "bg:yellow"
format = '[ $symbol ($version) ]($style)'

[java]
symbol = "оү– "
style = "bg:yellow"
format = '[ $symbol ($version) ]($style)'

[julia]
symbol = "оҳӨ "
style = "bg:yellow"
format = '[ $symbol ($version) ]($style)'

[kotlin]
symbol = "оҳҙ "
style = "bg:yellow"
format = '[ $symbol ($version) ]($style)'

[lua]
symbol = "оҳ  "
style = "bg:yellow"
format = '[ $symbol ($version) ]($style)'

[meson]
symbol = "у°”· "
style = "bg:yellow"
format = '[ $symbol ($version) ]($style)'

[nodejs]
symbol = "оңҳ"
style = "bg:yellow"
format = '[ $symbol ($version) ]($style)'

[nim]
symbol = "у°ҶҘ "
style = "bg:yellow"
format = '[ $symbol ($version) ]($style)'

[perl]
symbol = "оҷҫ "
style = "bg:yellow"
format = '[ $symbol ($version) ]($style)'

[php]
symbol = "оҳҲ "
style = "bg:yellow"
format = '[ $symbol ($version) ]($style)'

[python]
symbol = "оҳҶ"
style = "bg:yellow"
format = '[ $symbol( $version)(\(#$virtualenv\)) ]($style)'

[rust]
symbol = "оһЁ"
style = "bg:yellow"
format = '[ $symbol ($version) ]($style)'

[ruby]
symbol = "оһ‘ "
style = "bg:yellow"
format = '[ $symbol ($version) ]($style)'

[scala]
symbol = "оң· "
style = "bg:yellow"
format = '[ $symbol ($version) ]($style)'

[zig]
symbol = "оҡ© "
style = "bg:yellow"
format = '[ $symbol ($version) ]($style)'

[package]
symbol = "у°Ҹ— "

[time]
disabled = false
time_format = "%R" # Hour:Minute Format
style = "fg:light-white bg:blue"
format = '[ вҷҘ $time ]($style)'

[character]
disabled = false
success_symbol = '[вқҜ](bold fg:green)'
error_symbol = '[вқҜ](bold fg:red)'
vimcmd_symbol = '[вқ®](bold fg:green)'
vimcmd_replace_one_symbol = '[вқ®](bold fg:pink)'
vimcmd_replace_symbol = '[вқ®](bold fg:pink)'
vimcmd_visual_symbol = '[вқ®](bold fg:yellow)'

[palettes.foreverblush]
